<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>플렉서블 박스-플렉서블 아이템 추가-방향(column)</title>
<style>
* {
    margin: 0;
    padding: 0;
  }
  
  .container {
    width: 100px;
    height: 150px;
    background: yellow;
    
    display: flex;
    flex-wrap: wrap-reverse;
  }
  
  .item {
    height: 50px;
    background: green;
    border: solid 1px black;
  }
  
</style>
</head>
<body>
      <div class="container">
        <div class="item">helloflex</div>
        <div class="item">abc</div>
        <div class="item">helloflex123</div>
      </div>    
</body>
</html>
