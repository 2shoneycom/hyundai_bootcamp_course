<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>회원 가입</title>
</head>
<style>
#id, #pwd {
	width: 100px;
}

table {
	margin: 0 auto;
	width: 600px;
}
</style>
<body>
	<div id="wrap">
		<h3 align="center">회원 가입</h3>
		<hr>
		<form name="frmJoin" method="post" action="memberJoin">
			<table>
				<tr>
					<td>ID</td>
					<td><input type="text" id="id" name="id"></td>
				</tr>
				<tr>
					<td>비밀번호</td>
					<td><input type="password" id="pwd" name="pw"></td>
				</tr>
				<tr>
					<td>성명</td>
					<td><input type="text" id="name" name="name"></td>
				</tr>
				<tr>
					<td>이메일</td>
					<td><input type="text" id="email" name="email"></td>
				</tr>
				<tr>
					<td colspan="2" align="center"><br>
					<input type="submit" value="완료"> <input type="reset"
						value="취소"></td>
				</tr>
			</table>
		</form>
	</div>
</body>
</html>
