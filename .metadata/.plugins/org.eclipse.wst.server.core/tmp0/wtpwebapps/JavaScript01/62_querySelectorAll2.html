<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>querySelectorAll()</title>
<script type="text/javascript">

window.onload = function() {
	let headers = document.querySelectorAll('h3, #h1Id2, .h2Class1');
	
	for (let i = 0; i < headers.length; i++) {
		let header = headers[i];
		header.style.color = "orange";
		header.innerHTML = "From JavaScript";
	}
}
	
</script>
</head>
<body>
  <h1>Header</h1>
  <h1>Header</h1>
  <h1>Header</h1>
  <h1 id="h1Id1">Header</h1>
  <h1 id="h1Id2">H1Id2</h1>
  <h2 class="h2Class1">Header</h2>
  <h2 class="h2Class1">Header</h2>
  <h2 class="h2Class2">H2Class2</h2>
  <h2 class="h2Class2">H2Class2</h2>
  <h3>h3</h3>
</body>
</html>
