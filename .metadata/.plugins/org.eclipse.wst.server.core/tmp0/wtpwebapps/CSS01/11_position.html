<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Position 속성</title>
  <style type="text/css"> 	
    * {
      margin: 0;
      padding: 0;
    }
    #parent {
      position: relative;
      top: 0px;
      left: 0px;
      width: 200px;
      height: 300px;
      border: solid 5px #000;
    }
    #boxA, #boxB, #boxC {
      width: 80px;
      height: 80px; 
    }
    
    #boxA {
      background: red;
    }
    #boxB {
      background: green;
      position: absolute;
      top: 20px;
      left: 30px;
    }
    #boxC {
      background: blue;
    }
  </style>
</head>
	
<body>
  <div id="parent">
    <div id="boxA">A</div>
    <div id="boxB">B</div>
    <div id="boxC">C</div>
  </div>
  <div id="parent">
    <div id="boxA">A</div>
    <div id="boxB">B</div>
    <div id="boxC">C</div>
  </div>
  <div id="parent">
    <div id="boxA">A</div>
    <div id="boxB">B</div>
    <div id="boxC">C</div>
  </div>
</body>
</html>
