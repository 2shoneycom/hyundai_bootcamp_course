<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<title>CSS 선택자를 이용해 원하는 노드 찾기</title>
<style type="text/css">
#menuBox div {
  float: left;
  background-color: green;
  width: 100px;
  height: 50px;
}
</style>
<script src="jquery-3.7.1.min.js"></script>
<script type="text/javascript">
	$(document).ready(function() {
		let $menuItem = $('.menuItem');
		let $indexSpan = $('#indexSpan');
		
		// each(): jquery 메소드
		$menuItem.each(function(index) {
			// this: 현재 참조중인 객체 (현재 선택된 menuItem)
			// 이벤트 리스너 등록 hover(마우스 진입시 콜백함수, 마우스 나올때 콜백함수)
			$(this).hover(
				() => {
					// this: 이벤트가 발생한 객체 (마우스가 올라간 객체)
					$(this).css('background', 'yellow');
					$indexSpan.text(index);
				},
				() => {
					$(this).css('background', 'green');
					$indexSpan.text(index);
				},
			);
		});
	}); //ready() 종료
</script>
</head>

<body>
  <div id="wrap">
    <h2>
      인덱스 : <span id="indexSpan">index</span>
    </h2>
    <div id="menuBox">
      <div class="menuItem"></div>
      <div class="menuItem"></div>
      <div class="menuItem"></div>
      <div class="menuItem"></div>
    </div>
  </div>
</body>
</html>
