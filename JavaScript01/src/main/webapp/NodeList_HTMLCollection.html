<html>
<head>
<meta charset="UTF-8">
<title>NodeList/HTMLCollection</title>
<script type="text/javascript">
	window.onload = function() {
		var h1s = document.querySelectorAll('h1');
		var h2s = document.getElementsByTagName('h2');
		
		console.log(typeof(h1s));
		console.log(typeof(h2s));
		console.log(Object.prototype.toString.call(h1s));
		console.log(Object.prototype.toString.call(h2s));
		
		const h2Arr = Array.from(h2s);
		console.log(Object.prototype.toString.call(h2Arr));
	};
</script>
</head>
<body>
  <h1>Header</h1>
  <h1>Header</h1>
  <h1>Header</h1>

  <div>
    <h2>Header</h2>
    <h2>Header</h2>
    <h2>Header</h2>
  </div>
</body>
</html>
