<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>createElement('h3') 예제</title>
<script type="text/javascript">
	window.onload = function() {
		// 객체 생성
		let h3 = document.createElement('h3');
		let text = document.createTextNode("출력할 텍스트 : 홍길동, 동적 생성 문자열");
		
		// 생성된 객체 연결
		h3.appendChild(text);
		document.body.appendChild(h3);
	}
</script>
</head>

<body>
</body>
</html>
