<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Insert title here</title>
  <script type="text/javascript">
  // js가 JSON 객체의 구문 분석을 위해 추가한 메소드 
  // JSON.parse(), JSON.stringify()를 활용
  
  // 1. JSON.stringigy(배열) -> 배열을 JSON으로 변환
  // 2. JSON.parse(JSON객체) -> JSON 객체 구문 분석 후 객체 생성까지
  
  var arr=[1,2,3];
  var arrCopy = JSON.parse(JSON.stringify(arr));
  
  console.log("원본: ", arr);
  console.log("복사본: ", arrCopy);
  console.log(arr==arrCopy);
  </script>
</head>
<body>
	
</body>
</html>
