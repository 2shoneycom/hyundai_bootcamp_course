<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<script type="text/javascript">
	window.onload = () => {
		let body = document.getElementsByTagName('body');
		body[0].style.width = "100vw"; 
		body[0].style.height = "100vh";
		
		body[0].addEventListener('dblclick', () => {
			body[0].style.background = `rgb(${parseInt(Math.random()*255)}, ${parseInt(Math.random()*255)}, ${parseInt(Math.random()*255)})`;
		})
	}
</script>
</head>
<body>
  <h3>바탕 아무 곳에나 더블 클릭</h3>
  <hr>
  바탕 아무 곳이나 <b>더블클릭</b>하면 배경색이 랜덤하게 변합니다.
</body>
</html>
