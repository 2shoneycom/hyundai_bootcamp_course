<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>do~while 문</title>
		<script type="text/javascript">
var answer;
let count=0;

do {
	window.alert("경고창입니다");
	answer = window.confirm("계속 보시겠습니까?");
	count++;
}while(answer)
			
			document.write("경고창 출력 횟수 : " + count);
		</script>
	</head>
	<body>
		
	</body>
</html>
