<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Insert title here</title>
  <script type="text/javascript">	
	document.write("<table style=\"text-align: center\; width: 200px\;\">");
	document.write("<thead style=\"background: yellow\;\">");
		document.write("<tr>");
			document.write("<th>i</th><th>sum</th>");
		document.write("</tr>");
	document.write("<tbody>");
	
	let i = 1;
	let sum = 0;
	while (i <= 10) {
		sum += i;
		
		document.write("<tr>");
			document.write(`<td>${i}</td><td>${sum}</td>`);
		document.write("</tr>");
		
		i++;
	}
	
	document.write("</tbody>");
	document.write("</table>");
  
  </script>
</head>
<body>
	
</body>
</html>
