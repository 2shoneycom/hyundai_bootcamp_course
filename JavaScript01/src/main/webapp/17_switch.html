<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>switch 문</title>
  <script type="text/javascript">
    var input = prompt("다음의 숫자를 입력하세요.", "1 또는 2  또는 3");
    
    switch (input) {
    	case "1": 
    		document.write("<img alt=\"lizard.png\" src=\".\/image\/lizard.png\">");
    		break;
    	case "2": 
    		document.write("<img alt=\"lizardon.png\" src=\".\/image\/lizardon.png\">");
    		break;
    	case "3": 
    		document.write("<img alt=\"megalizardon.png\" src=\".\/image\/megalizardon.png\">");
    		break;
    	default: 
    		window.alert("잘못 입력하셨습니다");
    }
  </script>
</head>
<body>
  
</body>
</html>
