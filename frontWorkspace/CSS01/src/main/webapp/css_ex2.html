<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Insert title here</title>
  <style>
    #title {
      display: inline-block;
      background: black;
      color: white;
    }
    ul {
      list-style: none;
    }
    li {
      display: inline-block;
    }
    li:first-child {
      color: blue;
    }
    li:nth-child(2) {
      color: red;
      margin: 0 30px;
    }
    li:nth-child(3) {
      color: green;
    }
  </style>
</head>
<body>
  <h1 id="title">웹 기술 - 기본</h1>
  <ul>
    <li>HTML</li>
    <li>CSS</li>
    <li>Javascript 기초</li>
  </ul>
</body>
</html>
