<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>플렉서블 박스</title>
<style>
  * {
    margin: 0;
    padding: 0;
  }
  
  .container {
    width: 500px;
    height: 300px;
    border: solid 1px black;
    margin: 5px;
    display: flex;
    
  }
  
  .container div {
    width: 20%;
    /* height: 30%; */
  }
  
  .container div:first-child {
    background: red;
  }
  .container div:nth-child(2) {
    background: blue;
  }
  .container div:nth-child(3) {
    background: yellow;
  }

</style>
</head>
<body>
			<div class="container">
				<div></div><div></div><div></div>
			</div>
			
			<div class="container">
				<div></div><div></div><div></div>
			</div>			
</body>
</html>
