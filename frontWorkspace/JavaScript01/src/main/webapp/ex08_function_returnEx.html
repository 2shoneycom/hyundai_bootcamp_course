<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<script type="text/javascript">	

function input() {
	let korScr = Number(prompt("국어 점수 입력: "));
	let engScr = Number(prompt("영어 점수 입력: "));
	let mathScr = Number(prompt("수학 점수 입력: "));
	
	return (korScr + engScr + mathScr) / 3;
}

function start() {
	if (confirm("성적을 입력하시겠습니까?")) {
		alert("평균: " + input());
	}
	else {
		alert("종료합니다");
	}
}

</script>
</head>
<body>
  <button onClick="start()">성적 입력</button>	
</body>
</html>
