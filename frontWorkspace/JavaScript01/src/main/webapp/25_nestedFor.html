<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>중첩 for 문</title>
  <script type="text/javascript">
    for (i=1; i<=5; i++) {
    	for (j=1; j<=5; j++) {
    		document.write(j + " ");
    	}
    	document.write("<br>");
    }
    
    for (i=1; i<=4; i++) {
    	for (j=1; j<=7; j++) {
    		document.write("<img src=\"image/apple.png\">");
    	}
    	document.write("<br>");
    }

    /////////////////////* 연습문제 ex */////////////////////////
	
	for (i=1; i<=4; i++) {
		for (j=1; j<=7; j++) {
			j % 2 == 1 ?
				document.write("<img src=\"image/apple.png\">")	// 홀수 열은 사과
			:
				document.write("<img src=\"image/bomb.png\">")	// 짝수 열은 폭탄
		}
		document.write("<br>");
	}
  </script> 
</head>   
<body>   	  
</body>
</html>
