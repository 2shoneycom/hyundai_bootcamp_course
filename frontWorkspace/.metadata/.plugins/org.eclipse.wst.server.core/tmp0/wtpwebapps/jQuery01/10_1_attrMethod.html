<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<script src="jquery-3.7.1.min.js"></script>
<script type="text/javascript">
	// 객체.attr(): style 속성이 아닌 태그의 다른 속을 설정하거나 설정된 속성을 추출할 때 사용
	// 속성 지정
	$(document).ready(function() {
		$('img').attr({
			alt: 'jQuery 라이브러리 사용 속성 지정',
			src: 'image/painting.jpg',
			width: 100,
		});
		
		let $src = $('script').attr('src');
		alert($src);
	});
</script>
</head>
<body>
  <img>
</body>
</html>
