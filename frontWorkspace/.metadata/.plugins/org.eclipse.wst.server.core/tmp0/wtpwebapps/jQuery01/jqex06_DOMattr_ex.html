<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DOM : attr() : 속성 변경</title>
<style type="text/css">
div {
  margin: 0 auto;
  width: 800px;
}

img {
  width: 200px;
  height: 100px;
}
</style>

<script src="jquery-3.7.1.min.js"></script>
<script type="text/javascript">
	$(document).ready(function() {
		// jQuery 변수로 img 요소들을 받아옴
		let $imgs = $('img');
		
		// each() 메소드로 하나씩 순회
		$imgs.each(function(index) {
			$(this)
			.on('mouseover', function() {
				// 마우스가 이미지에 올라갈 시 이미지 변경
				$(this).attr({
					src: `image/img2-${index+1}.jpg`,
				});				
			})
			.on('mouseout', function() {
				// 마우스가 이미지에서 벗어날 시 이미지 원래대로
				$(this).attr({
					src: `image/img1-${index+1}.jpg`,
				});				
			});
		});
	});
</script>
</head>
<body>
  <div>
    <img src="image/img1-1.jpg">
    <img src="image/img1-2.jpg">
    <img src="image/img1-3.jpg">
    <img src="image/img1-4.jpg">
  </div>
</body>

</html>
