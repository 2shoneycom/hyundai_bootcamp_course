<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>윈도우 이벤트 : 이미지 크기 동적 변경</title>
<script src="jquery-3.7.1.min.js"></script>
<style>
* {
  margin: 0;
}
/* img { width:100%;}  */
</style>
<script type="text/javascript">
	$(document).ready(function() {
		let $img = $('img');	// 이미지 객체 가져오기
		
		$img.css('width', '100vw');	// 처음 실행시에 창 너비 맞추기 (추가 조건)
		
		// 윈도우 창 크기가 변할때 이벤트 등록
		$(window).resize(function() {
			$img.css('width', '100vw');
		});
	});
</script>
</head>
<body>
  <div id="topImgBox">
    <img src="image/topImg.jpg" id="topImg">
  </div>
</body>
</html>
