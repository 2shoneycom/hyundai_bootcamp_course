<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Insert title here</title>
  <script type="text/javascript">	
  function input() {
	  let row = parseInt(window.prompt("테이블의 행 수 입력"));
	  let col = parseInt(window.prompt("테이블의 행 수 입력"));
	  
	  makeTable(row, col);
  }
  
  let makeTable = (row, col) => {
	  document.write("<table border='1'>");
	  for (let i = 0; i < row; i++) {
		  document.write("<tr>");
		  for (let j = 0; j < col; j++) {
			  document.write("<td>★<\/td>");
		  }
		  document.write("</tr>");
	  }
	  document.write("</table>");
  }
  
  </script>
</head>
<body>
  <button onClick="input()">테이블 만들기</button>
</body>
</html>
