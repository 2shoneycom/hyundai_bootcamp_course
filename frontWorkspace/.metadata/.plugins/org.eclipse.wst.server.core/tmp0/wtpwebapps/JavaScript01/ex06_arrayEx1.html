<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Insert title here</title>
  <style type="text/css">
    ol {
      list-style: upper-alpha;
    }
  </style>
  <script type="text/javascript">	

  let colors = new Array(4);
  let output = "<ol>";
  
  for (let i = 0; i < colors.length; i++) {
	  colors[i] = prompt("색상 입력");
	  output += ("<li>" + colors[i] + "</li>"); 
  }
  
  output += "</ol>";
  
  document.write(output);
  
  </script>
</head>
<body>
	
</body>
</html>
