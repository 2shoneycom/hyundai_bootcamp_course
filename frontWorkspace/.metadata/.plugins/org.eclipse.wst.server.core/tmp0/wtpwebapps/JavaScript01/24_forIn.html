<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
        <title>for in 예제</title>
        <script type="text/javascript">    		    
			 var fruits = ["사과", "포도", "복숭아"];	//배열 선언 및 초기화		
			 
			for (var i in fruits) {
				document.write(`fruits[${i}]= ${fruits[i]} <br>`);
			}
			 
			 var arr = ["사과", "배", "복숭아", "포도"];
			 
			 arr.forEach(
				 function(item) {
					 console.log(item);
				 }
			 );
			 
			 arr.forEach(
				 function(asd, qwe) {
					 console.log(asd, qwe);
				 }
			 );
			 
			 document.write("매개변수는 전역변수인가? -> " + item);
        </script>        
    </head>   
    <body>   	  
    </body>
</html>
