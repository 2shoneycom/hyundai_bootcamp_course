<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>변수</title>
		<script type="text/javascript">
			// 명시적 선언
			var num = 10;
			let pi = 3.14;
			let ch = 'a';
			let name;
			name = "홍길동";
			var num = "숫자"; // var로 선언시 중복 선언 가능 
			
			// 명시적 선언 없이 사용 가능
			address = "충남 천안시";
			nation = "대한민국";
			
			
			document.write(num); // 변수 값만 출력
			
			// 문자열과 변수, 태그 연결해서 출력
			document.write("<br>");
			document.write("num : " + num + "<br>");	// 정수형 + 문자형 = 문자형
			document.write("pi : " + pi + "<br>");		// 실수형 + 문자형 = 문자형
			document.write("ch : " + ch + "<br>");		
			document.write("name : " + name + "<br>");
			document.write("address : " + address + "<br>");
			document.write("nation : " + nation);
		</script>
	</head>
	<body>
		
	</body>
</html>
