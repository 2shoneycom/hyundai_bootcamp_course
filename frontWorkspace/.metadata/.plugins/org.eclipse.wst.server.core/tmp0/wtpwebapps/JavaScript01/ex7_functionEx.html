<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Insert title here</title>
<script type="text/javascript">

function show() {
	document.write("★");
}

function input() {
	let count = parseInt(prompt("숫자 입력"));
	for (let i = 0; i < count; i++) {
		show();
	}
}

</script>
</head>
<body>
  <button onClick="input()">숫자 입력</button>
</body>
</html>
