<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>querySelector()</title>
<script type="text/javascript">
	
	window.onload = function() {
		let h1 = document.querySelector('h1')
		h1.innerHTML = "Boo!";
		h1.style.color = "orange";
		h1.style.height = "400px";
	}
	
</script>
</head>
<body>
  <h1>Header</h1>
  <h1>Header</h1>
  <h1>Header</h1>
</body>
</html>
