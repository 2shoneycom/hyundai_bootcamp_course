<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
  <h2>회원가입</h2>
  <hr>
  <form method="post" action="temp.html">
    성명<input type="text" name="name" autofocus>
    <br><br>
    아이디<input type="text" name="id"><input type="button" value="ID중복체크">(영문+특수문: 6~10자)
    <br><br>
    비밀번호<input type="password" name="pwd">(영문자+숫자+특수문자: 10~20자)
    <br><br>
    비밀번호 확인<input type="password" name="pwdc">
    <br><br>
    생년월일<input type="text" name="birthYear" maxlength="4">년
    <select name="birthMonth">
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4">4</option>
      <option value="5">5</option>
      <option value="6">6</option>
      <option value="7">7</option>
      <option value="8">8</option>
      <option value="9">9</option>
      <option value="10">10</option>
      <option value="11">11</option>
      <option value="12">12</option>
    </select>월
    <select name="birthDay">
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4">4</option>
      <option value="5">5</option>
      <option value="6">6</option>
      <option value="7">7</option>
      <option value="8">8</option>
      <option value="9">9</option>
      <option value="10">10</option>
      <option value="11">11</option>
      <option value="12">12</option>
    </select>일
    <label><input type="radio" name="birthType" value="양력">양력</label>
    <label><input type="radio" name="birthType" value="음력">음력</label>
    <br><br>
    전화번호
    <select name="frontHomePhone">
      <option value="02">02</option>
      <option value="070">070</option>
      <option value="031">031</option>
    </select>
    -<input type="text" name="middleHomePhone" maxlength="4">-<input type="text" name="backHomePhone" maxlength="4">
    <br><br>
    휴대폰번호
    <select name="frontCell">
      <option value="010">010</option>
      <option value="011">011</option>
      <option value="012">012</option>
    </select>
    -<input type="text" name="middleCell" maxlength="4">-<input type="text" name="backCell" maxlength="4">
    <br><br>
    주소
    <input type="text" name="postalCode" readOnly><input type="button" value="우편번호찾기"><br>
    <input type="text" name="address" readOnly><br>
    <input type="text" name="detailAddress" readOnly>상세 주소 입력
    <br><br>
    성별
    <label><input type="radio" name="sex" value="male" checked>남</label>
    <label><input type="radio" name="sex" value="female" checked>여</label>
    <br><br>
    직업
    <select name="job">
      <option value="programmer" selected>프로그래머</option>
      <option value="salaryman">직장인</option>
      <option value="student">학생</option>
      <option value="주부">주부</option>
    </select>
    <br><br>
    이메일
    <input type="text" name="frontEmail">@
    <select name="emailDomain">
      <option value="naver" selected>naver.com</option>
      <option value="google">google.com</option>
      <option value="daum">daum.net</option>
    </select>
    <br><br>
    이메일 수신 여부
    <label><input type="radio" name="agreeEmail" value="yes">예</label>
    <label><input type="radio" name="agreeEmail" value="no">아니오</label>
    <br><br>
    관심분야
    <label><input type="checkbox" name="frontend" value="frontend">프론트엔드</label>
    <label><input type="checkbox" name="backend" value="backend">백엔드</label>
    <label><input type="checkbox" name="fullstack" value="fullstack">풀스택</label>
    <label><input type="checkbox" name="java" value="java">자바</label>
    <br><br>
    <input type="submit" value="회원가입">
    <input type="reset" value="취 소">
  </form>
</body>
</html>
